<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #ffb6c1, #ff69b4);
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.2);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      width: 80%;
      max-width: 420px;
      position: relative;
      z-index: 2;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 20px;
      background: white;
      color: #ff1493;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    #surprise {
      display: none;
    }

    .heart {
      position: absolute;
      color: white;
      animation: floatUp 5s linear infinite;
      font-size: 18px;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    .name {
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="card" id="start">
  <h1>💌 A Special Surprise For You</h1>
  <p class="name">Keareilemang ❤️</p>
  <button onclick="openSurprise()">Open Your Gift 🎁</button>
</div>

<div class="card" id="surprise">
  <h1>🎂 Happy Birthday My Love ❤️</h1>
  <p>You are my happiness, my peace, my everything 💖</p>
  <p>Wishing you the most beautiful year ahead 🌸</p>
</div>

<script>
function openSurprise(){
  document.getElementById("start").style.display="none";
  document.getElementById("surprise").style.display="block";
}

/* floating hearts */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
</html>
