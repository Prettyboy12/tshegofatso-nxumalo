<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday ‚Ě§ÔłŹ</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      background: radial-gradient(circle at top, #ff9a9e, #ff4d94, #6a0572);
    }

    .card {
      background: rgba(255,255,255,0.12);
      padding: 25px;
      border-radius: 25px;
      backdrop-filter: blur(14px);
      width: 90%;
      max-width: 450px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      position: relative;
      z-index: 2;
    }

    button {
      padding: 12px 22px;
      border: none;
      border-radius: 30px;
      background: white;
      color: #ff1493;
      font-weight: bold;
      cursor: pointer;
      margin-top: 12px;
    }

    #surprise { display: none; }

    /* LOCK SCREEN */
    #lockScreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.75);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10;
      text-align: center;
      padding: 20px;
    }

    #letter {
      display: none;
      white-space: pre-line;
      text-align: left;
      font-size: 14px;
      line-height: 1.6;
      max-height: 300px;
      overflow-y: auto;
    }

    /* envelope animation */
    .envelope {
      width: 120px;
      height: 80px;
      background: pink;
      position: relative;
      border-radius: 10px;
      margin-bottom: 15px;
      animation: float 2s infinite ease-in-out;
    }

    .envelope:before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 60px solid transparent;
      border-right: 60px solid transparent;
      border-bottom: 40px solid #ff69b4;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0); }
    }

    #countdown {
      font-size: 18px;
      margin-top: 10px;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="card">
  <h1>ūüíĆ Birthday Surprise</h1>
  <p>Something special is waiting for you‚Ä¶</p>

  <button onclick="openSurprise()">Open Gift ūüéĀ</button>
</div>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="envelope"></div>
  <h2>ūüíĆ Love Letter Locked</h2>
  <p>This message will unlock at midnight ‚Ě§ÔłŹ</p>
  <p id="countdown"></p>
</div>

<!-- SURPRISE LETTER -->
<div class="card" id="surprise">
  <h2>ūüéā Happy Birthday ‚Ě§ÔłŹ</h2>
  <p>Music of your choice: Nasty C - Everything ūüéĶ</p>

  <!-- Put YouTube link here manually -->
  <p style="font-size:12px;opacity:0.7;">
    (Add YouTube link for the song here)
  </p>

  <hr style="margin:10px 0;">

  <div id="letter"></div>
</div>

<script>

function openSurprise(){
  document.querySelector(".card").style.display = "none";
}

/* LOVE LETTER TEXT */
const letterText = `
Ohh pretty face, klklklk

Happy Birthday, my sweetheart ‚Ě§ÔłŹ

I‚Äôve been trying to find the right words, but nothing ever feels enough when it comes to you. You are the kind of person who makes my life softer, warmer and so much more beautiful just by being in it.

Today, I don‚Äôt just celebrate your birthday‚Ä¶ I celebrate you, your smile that I can‚Äôt get out of my head, your voice that feels like comfort and your presence that somehow makes everything feel right.

If I could, I‚Äôd wrap all my feelings for you into one moment so you could feel exactly how much you mean to me. But since I can‚Äôt, I‚Äôll just say this... you are deeply special to me in a way I can‚Äôt explain without my heart racing a little.

On your birthday, I hope life is gentle with you, I hope you get everything you dream of and even the things you stopped wishing for. You deserve love that feels safe, happiness that lasts and peace that never leaves you.

And selfishly‚Ä¶ I hope I get to keep being part of your story, even in the smallest ways.

Happy Birthday, my love ‚Ě§ÔłŹ
I always think about you ‚Ě§ÔłŹ‚Ě§ÔłŹ‚Ě§ÔłŹ
`;

/* TYPE EFFECT */
function typeLetter(text, i=0){
  if(i < text.length){
    document.getElementById("letter").innerHTML += text.charAt(i);
    setTimeout(()=>typeLetter(text,i+1), 25);
  }
}

/* COUNTDOWN */
function updateCountdown() {
  let now = new Date();
  let target = new Date();
  target.setDate(target.getDate() + 1);
  target.setHours(0,0,0,0);

  let diff = target - now;

  if(diff <= 0){
    unlockLetter();
    return;
  }

  let h = Math.floor(diff / (1000*60*60));
  let m = Math.floor((diff % (1000*60*60)) / (1000*60));
  let s = Math.floor((diff % (1000*60)) / 1000);

  document.getElementById("countdown").innerText =
    h + "h " + m + "m " + s + "s";
}

setInterval(updateCountdown, 1000);
updateCountdown();

/* UNLOCK LETTER */
function unlockLetter(){
  document.getElementById("lockScreen").style.display = "none";
  document.getElementById("surprise").style.display = "block";
  document.getElementById("letter").style.display = "block";
  typeLetter(letterText);
}

</script>

</body>
</html>
